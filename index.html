<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, shrink-to-fit=no"
    />
    <meta name="theme-color" content="#292929" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/icon.svg" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Highlighter" />
    <title>Highlighter</title>
  </head>
  <body>
    <style>
      body {
        --app-primary-color: #292929;
        --app-primary-font-color: white;
        --app-white: #f5f5f5;
        --app-grey: #7e7e7e;
        --app-light-grey: #d9d9d9;
        --app-border-radius: 4px;
        --primary-font-family: system-ui, -apple-system, sans-serif;
        --box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
      }
      html,
      body {
        height: 100vh;
        margin: 0;
        padding: 0;
        font-family: var(--primary-font-family);
      }
      body {
        display: flex;
        flex-direction: column;
        background-color: var(--app-white);
      }
    </style>
    <app-enter></app-enter>
    <noscript>Your browser does not support JavaScript!</noscript>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/sw.js")
            .catch((err) => console.error("SW registration failed:", err));
        });
      }
    </script>
  </body>
</html>
